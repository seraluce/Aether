name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g pnpm@11.10.0

      - run: |
          echo "PATH=$PATH"
          which pnpm || echo "pnpm not in PATH"
          pnpm --version
          npm list -g pnpm 2>&1 || true
          pnpm install 2>&1; exit_code=$?
          echo "## pnpm install (exit=$exit_code)" >> $GITHUB_STEP_SUMMARY
          pnpm store path >> $GITHUB_STEP_SUMMARY 2>&1 || true
          exit $exit_code

      - run: pnpm build
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=aether
