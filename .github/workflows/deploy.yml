name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.10.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Test pnpm
        run: |
          echo "PATH=$PATH" | tee -a "$GITHUB_STEP_SUMMARY"
          which pnpm || echo "pnpm not found"
          node --version
          pnpm --version
          pnpm install 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          exit ${PIPESTATUS[0]}

      - run: pnpm build
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=aether
