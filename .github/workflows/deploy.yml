name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@11.10.0

      - name: Debug env
        run: |
          echo "node: $(node --version)"
          echo "pnpm: $(pnpm --version 2>&1)"
          echo "which: $(which pnpm)"

      - name: Install deps
        run: |
          pnpm install > /tmp/pnpm-out.txt 2>&1; code=$?
          cat /tmp/pnpm-out.txt
          echo "exit code: $code"
          while IFS= read -r line; do
            echo "::error::$line"
          done < /tmp/pnpm-out.txt
          exit $code

      - run: pnpm build
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=aether
